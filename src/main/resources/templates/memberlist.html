<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Members</title>
</head>
<body>

<h1>Club Members</h1>

<table th:frameborder="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Rating</th>
    </tr>

    <tr th:each="member : ${members}">
        <td th:text="${member.id}"></td>
        <td th:text="${member.fullName}"></td>
        <td th:text="${member.rating}"></td>
    </tr>

</table>

</body>
</html>
