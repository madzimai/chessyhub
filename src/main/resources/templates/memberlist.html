<form th:action="@{/members/search}" method="get">

    <input
            type="text"
            name="keyword"
            placeholder="Search member..."
            th:value="${keyword}"/>

    <button type="submit">
        Search
    </button>

    <a th:href="@{/members}">
        Clear
    </a>

</form>

<br>

<table th:frame="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Rating</th>
        <th>Actions</th>
    </tr>

    <tr th:each="member : ${members}">

        <td th:text="${member.id}"></td>
        <td th:text="${member.fullName}"></td>
        <td th:text="${member.phoneNumber}"></td>
        <td th:text="${member.email}"></td>
        <td th:text="${member.rating}"></td>

        <td>
            <a th:href="@{/members/edit/{id}(id=${member.id})}">
                Edit
            </a>

            |

            <a th:href="@{/members/delete/{id}(id=${member.id})}"
               onclick="return confirm('Delete this member?')">
                Delete
            </a>
        </td>

    </tr>

</table>
